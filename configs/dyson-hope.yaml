# dyson-hope.yaml — instance config

instance:
  name: dyson-hope-music-culture
  purpose_context: |
    Dyson Hope is a DJ, producer, and music educator based in [location].
    This observation engine monitors music culture to surface signals relevant
    to his creative practice, content output, and artistic positioning.
    Focus: electronic music culture, DJ/producer ecosystem, music technology,
    underground vs. mainstream dynamics, and scene community.

lens_library_path: lenses/           # relative to vault root; one .md per lens

sources:
  rss:
    enabled: true
    feeds:
      # --- Confirmed working ---
      - name: "DJ Mag"
        url: "https://djmag.com/feed"
        slug: "djmag"
      - name: "XLR8R"
        url: "https://www.xlr8r.com/feed/"
        slug: "xlr8r"
      - name: "Attack Magazine"
        url: "https://www.attackmagazine.com/feed/"
        slug: "attack"
      - name: "Fact Magazine"
        url: "https://www.factmag.com/feed/"
        slug: "fact"
      - name: "Dancing Astronaut"
        url: "https://dancingastronaut.com/feed/"
        slug: "dancingastronaut"
      - name: "Magnetic Magazine"
        url: "https://www.magneticmag.com/feed/"
        slug: "magnetic"
      # --- Additional feeds to try ---
      - name: "Data Transmission"
        url: "https://datatransmission.co/feed/"
        slug: "datatransmission"
      # - name: "Traxsource Blog"   # bad XML
      - name: "Music Ally"
        url: "https://musically.com/feed/"
        slug: "musicallly"
      # --- Broken / disabled (wrong URL or bad XML — revisit later) ---
      # - name: "Resident Advisor"     # bozo, 0 entries — RA feed URL unknown
      # - name: "Mixmag"               # bad XML at char 38
      # - name: "Electronic Beats"     # bad XML at char 35
      # - name: "Beatportal"           # returns HTML (not RSS)
      # - name: "Pitchfork Electronic" # returns HTML (not RSS)
      # - name: "MusicTech"            # SSL hostname mismatch

  reddit:
    enabled: true          # INI-100: re-enabled (was false behind OAuth friction).
                           # Goes live on the Mac mini when the CEO merges this PR.
    # INI-100: unauthenticated public .json access — no client_id/client_secret,
    # no registered Reddit app. ToS disposition (accept + document) recorded in
    # governance: portfolio/INI-100.md § Governance notes.
    #
    # The live 7 subreddits (CONFIRM membership at PR review). Reconciled from the
    # prior 26-sub list to the spike's working set; `abletonlive` corrected to
    # `ableton` (the live sub). Per-sub traffic notes are YAML comments (the old
    # inline annotations broke the subreddit strings).
    subreddits:
      - ableton            # was abletonlive (non-existent); production/DAW
      - musicproduction    # production craft + discussion
      - edmproduction      # producer technique
      - aves               # high-traffic electronic culture (widest dynamic range)
      - electronicmusic    # broad scene + discourse
      - breakbeat          # CEO genre focus
      - DJs                # performer/practice discussion

    # Weekly top, top-N per sub (NOT a global min_score — cross-sub dynamic range
    # is too large for a flat threshold). min_score_floor is a low NOISE floor.
    time_filter: "week"
    fetch_limit: 25         # listing rows requested per sub before top-N
    top_n_per_sub: 5        # keep the best N per sub (every community represented)
    min_score_floor: 5      # discard near-zero-score noise only; NOT a popularity gate

    # Relevance funnel (INI-100) — precision-first gating before the processor.
    funnel:
      enabled: true
      triage_threshold: 3   # reaction-worthiness 0-5; >=3 survives to deep-dive
      deep_dive: true       # fetch comment trees for survivors (Stage 3)
      # max_survivors: 20   # optional hard cap on deep-dives/processing per run
      interest_taxonomy:    # Stage-1 title-match keywords (CEO interests)
        - breakbeat
        - underground
        - ableton
        - sampling
        - rave
        - sound design
        - mixing
        - label
        - culture
        - scene

  beatport:
    enabled: false  # Cloudflare 403 — requires browser automation or official API key
    charts:
      - genre: "Techno (Raw / Deep / Hypnotic)"
        slug: "techno-raw-deep-hypnotic"
      - genre: "House"
        slug: "house"
      - genre: "Melodic House & Techno"
        slug: "melodic-house-techno"
      - genre: "Organic House / Downtempo"
        slug: "organic-house-downtempo"
    top_n: 10              # tracks to pull per chart

output:
  vault_path: "/Volumes/SandboxData/observation-vaults/dyson-hope-music-culture/"
  inbox_folder: "Observation Inbox"
  interest_threshold: 2   # minimum interest_level to write to vault

schedule:
  cron: "0 8 * * *"       # 08:00 daily
